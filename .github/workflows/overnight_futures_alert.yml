name: 미국 야간 지수선물 신호 알림

on:
  schedule:
    # KST 21:00 (오후9시) 월~금 = UTC 12:00 Mon-Fri  (프리마켓 직전)
    - cron: '0 12 * * 1-5'
    # KST 00:00 (자정)    월~금 = UTC 15:00 Sun-Thu
    - cron: '0 15 * * 0-4'
    # KST 07:00 (오전7시) 월~금 = UTC 22:00 Sun-Thu  (애프터마켓 종료 후)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  overnight-futures:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install "yfinance==1.2.0" pandas numpy python-dotenv requests

      - name: 중복 방지 캐시 복원
        uses: actions/cache@v4
        with:
          path: .overnight_futures_seen.json
          key: overnight-futures-seen-${{ github.run_id }}
          restore-keys: |
            overnight-futures-seen-

      - name: 야간 선물 신호 체크
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHART_BOT_CHANNEL_ID: ${{ secrets.CHART_BOT_CHANNEL_ID }}
        run: python tests/overnight_futures_alert.py
